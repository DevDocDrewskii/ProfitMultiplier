hooks:
  EconomyShopGUI: true
  ShopGUIPlus: true
  zShop: true
  UltimateShop: true
  GUIShop: true

currency:
  symbol: "$"
  position: PREFIX
  format: "#,##0.##"
  custom:
    gems:
      symbol: " gems"
      position: SUFFIX
      format: "#,##0"
    tokens:
      symbol: "⛁ "
      position: PREFIX
      format: "#,##0"

items:
  DIAMOND:
    tiers:
      - threshold: 20
        multiplier: 1.1
      - threshold: 50
        multiplier: 1.25
      - threshold: 100
        multiplier: 1.5
  GOLD_INGOT:
    tiers:
      - threshold: 32
        multiplier: 1.15
      - threshold: 64
        multiplier: 1.3
  IRON_INGOT:
    tiers:
      - threshold: 64
        multiplier: 1.1
      - threshold: 128
        multiplier: 1.2

groups:
  crops:
    icon: GRASS_BLOCK
    display-name: "Crops"

    stack-mode: group

    materials:
      - WHEAT
      - CARROT
      - POTATO
      - BEETROOT
      - NETHER_WART
      - SUGAR_CANE
      - PUMPKIN
      - MELON
      - MELON_SLICE
      - KELP
      - BAMBOO
      - COCOA_BEANS
      - SWEET_BERRIES
      - GLOW_BERRIES
      - CACTUS
      - CHORUS_FRUIT
    tiers:
      - threshold: 10000
        multiplier: 1.1
        icon: GRASS_BLOCK
      - threshold: 100000
        multiplier: 1.2
        icon: WHEAT
      - threshold: 1000000
        multiplier: 1.3
        icon: KELP

  mob_drops:
    icon: ROTTEN_FLESH
    display-name: "Mob Drops"
    currency: tokens
    materials:
      - ROTTEN_FLESH
      - BONE
      - STRING
      - SPIDER_EYE
      - GUNPOWDER
      - ENDER_PEARL
      - SLIME_BALL
      - BLAZE_ROD
    tiers:
      - threshold: 5000
        multiplier: 1.1
        icon: BONE
      - threshold: 50000
        multiplier: 1.25
        icon: ENDER_PEARL
      - threshold: 500000
        multiplier: 1.5
        icon: BLAZE_ROD

  ores:
    icon: DIAMOND
    display-name: "Ores"
    stack-mode: stack
    materials:
      - DIAMOND
      - GOLD_INGOT
      - IRON_INGOT
      - EMERALD
      - COAL
      - REDSTONE
      - LAPIS_LAZULI
      - COPPER_INGOT
    tiers:
      - threshold: 5000
        multiplier: 1.1
        icon: IRON_INGOT
      - threshold: 50000
        multiplier: 1.2
        icon: GOLD_INGOT
      - threshold: 250000
        multiplier: 1.3
        icon: DIAMOND

default:

  enabled: true

  threshold: 1000

  multiplier: 1.1

  blacklist:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - STRUCTURE_BLOCK

auto-reset:
  enabled: false

  interval: WEEKLY

debug: false
