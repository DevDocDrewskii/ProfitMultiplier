title: "&8» &2&lMultiplier Groups"
size: 54
update: true

filler:
  enabled: true
  material: GRAY_STAINED_GLASS_PANE
  name: " "

content-slots:
  - "10-16"
  - "19-25"
  - "28-34"
  - "37-43"

content-source: groups

content:
  material: "{icon}"
  name: "&a&l{group_name}"
  lore:
    - "&7Total sold: &f{sold}"
    - "&7Current multiplier: &a{current_multiplier}x"
    - "&7Best tier: &b{max_multiplier}x &7(&f{tier_count} &7tiers)"
    - ""
    - "&7Next tier: &e{threshold} &8(&f{remaining_short} &7to go&8)"
    - "{progress_bar} &7{progress_percent}%"
    - ""
    - "&8PAPI: %profitmultiplier_group_multiplier_{group}%"
  actions:
    any:
      - "[message] &a{group_name}&7: &f{sold} &7sold — currently &a{current_multiplier}x&7."
      - "[sound] UI_BUTTON_CLICK 1 1.2"

items:

  previous:
    material: ARROW
    slot: 48
    name: "&e« Previous Page"
    hide-on-first-page: true
    lore:
      - "&7Go to page &f{previous_page}&7."
    actions:
      any:
        - "[previous-page]"
        - "[sound] UI_BUTTON_CLICK 1 1"

  page-info:
    material: PAPER
    slot: 49
    name: "&fPage &a{page}&7/&a{total_pages}"
    lore:
      - "&7Browse every sell-multiplier group."
      - "&7Add more in &fconfig.yml &7→ they show up here."

  next:
    material: ARROW
    slot: 50
    name: "&eNext Page »"
    hide-on-last-page: true
    lore:
      - "&7Go to page &f{next_page}&7."
    actions:
      any:
        - "[next-page]"
        - "[sound] UI_BUTTON_CLICK 1 1"

  close:
    material: BARRIER
    slot: 53
    name: "&c&lClose"
    actions:
      any:
        - "[close]"
        - "[sound] UI_BUTTON_CLICK 1 1"
