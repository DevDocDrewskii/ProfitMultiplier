prefix: "&8[&6ProfitMultiplier&8]&r "

messages:

  multiplier-applied:
    enabled: true
    message: "{prefix}&fSold &e{amount}x {item} &ffor &a{final} &7(+&a{bonus}&7, &b{multiplier}x&7) &8| &7Total sold: &f{total}"

  threshold-reached:
    enabled: true
    message: "{prefix}&6&lMILESTONE! &fYou've sold &e{total}x {item} &fand unlocked a &b{multiplier}x &fsell multiplier!"

  group-threshold-reached:
    enabled: true
    message: "{prefix}&6&lMILESTONE! &fYou've sold &e{total} {group} &fand unlocked a &b{multiplier}x &fsell multiplier on all {group}!"

  bonus-display:
    enabled: true
    message: " &7(+&a${bonus} &7bonus)"

  no-permission:
    enabled: true
    message: "{prefix}&cYou don't have permission to do that."

  config-reloaded:
    enabled: true
    message: "{prefix}&aConfig and language files reloaded."

  reset-player:
    enabled: true
    message: "{prefix}&aReset sold-totals for &e{player}&a."

  reset-player-none:
    enabled: true
    message: "{prefix}&eNo tracked sales found for &f{player}&e."

  reset-all:
    enabled: true
    message: "{prefix}&aReset sold-totals for &e{count}&a player(s)."

  stats-header:
    enabled: true
    message: "&6&lSell progression &7— &f{player}"

  stats-line:
    enabled: true
    message: "&7- &f{item}&7: &e{sold} &7sold &8| &7multiplier: {multiplier}"

  stats-none:
    enabled: true
    message: "{prefix}&eNo tracked sales for &f{player}&e."

  usage-reset:
    enabled: true
    message: "{prefix}&cUsage: /pm reset <player>"

  console-needs-player:
    enabled: true
    message: "{prefix}&cConsole must specify a player: /pm stats <player>"

  unknown-subcommand:
    enabled: true
    message: "{prefix}&cUnknown sub-command. Use /pm help."

  menu-unknown:
    enabled: true
    message: "{prefix}&cNo menu named &f{menu}&c. Check plugins/ProfitMultiplier/menus/."

  menu-opened-other:
    enabled: true
    message: "{prefix}&aOpened menu &f{menu} &afor &e{player}&a."

  player-not-online:
    enabled: true
    message: "{prefix}&cPlayer &f{player} &cis not online."
